<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Parte 2 Corregida</title>
</head>
<body>

<script>

/*
BUG:
La misma carta podía seleccionarse dos veces.

FIX:
Se valida si la carta ya está volteada
o encontrada.
*/

/*
BUG:
No existía bloqueo del tablero.

FIX:
Se agregó bloqueado = true mientras
se resuelve el turno.
*/

/*
BUG:
La comparación se hacía leyendo
textContent del DOM.

FIX:
Ahora se compara usando el estado.
*/

/*
BUG:
Uso de innerHTML con datos del usuario.

FIX:
Uso de textContent para evitar XSS.
*/

const state = {
    bloqueado:false,
    cartas:[]
};

function manejarCarta(indice){

    if(state.bloqueado){
        return;
    }

    const carta = state.cartas[indice];

    // FIX:
    if(carta.volteada){
        return;
    }

    // FIX:
    if(carta.encontrada){
        return;
    }
}

function verificarPar(a,b){

    // BUG:
    // divs[a].textContent === divs[b].textContent

    // FIX:
    return (
        state.cartas[a].emoji ===
        state.cartas[b].emoji
    );
}

function mostrarVictoria(nombre){

    const mensaje =
        document.createElement("p");

    // BUG:
    // mensaje.innerHTML = nombre;

    // FIX:
    mensaje.textContent =
        `¡Ganaste, ${nombre}!`;

    document.body.appendChild(mensaje);
}

</script>

</body>
</html>
